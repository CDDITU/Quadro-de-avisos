    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Melhorias visuais e responsivas adicionais */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Smooth scroll e melhorias touch */
        .overflow-y-auto {
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Cards com efeito hover suave em mobile */
        .card-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (hover: hover) {
            .card-hover:hover {
                transform: translateY(-2px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            }
        }
        
        /* Loading skeleton animation */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        /* Mobile menu drawer improvements */
        @media (max-width: 768px) {
            .mobile-menu-overlay {
                transition: opacity 0.3s ease;
            }
        }
        
        /* Better touch targets */
        button, 
        [onclick],
        .touch-target {
            cursor: pointer;
            min-height: 44px;
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* Modal improvements for mobile */
        @media (max-width: 640px) {
            .modal-content {
                margin: 16px;
                max-height: calc(100vh - 32px);
            }
            
            input, textarea, select, button {
                font-size: 16px !important; /* Prevents zoom on focus in iOS */
            }
        }
        
        /* Badge pulse animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1.05); opacity: 0; }
        }
        
        .badge-pulse::after {
            content: '';
            position: absolute;
            top: -2px;
            right: -2px;
            width: 100%;
            height: 100%;
            border-radius: 9999px;
            background: rgba(249, 115, 22, 0.4);
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        /* Glassmorphism effect for modals */
        .glass-backdrop {
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.5);
        }
        
        /* Floating action button for mobile */
        .fab-mobile {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .fab-mobile:active {
            transform: scale(0.95);
        }
        
        /* Improved card layout */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

    <!-- LOGICA DE COMPORTAMENTO INTERNO DO LAYOUT -->
    <script>
        // Mobile menu functions
        window.toggleMobileMenu = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-menu-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
            document.body.style.overflow = sidebar.classList.contains('-translate-x-full') ? '' : 'hidden';
        }
        
        window.closeMobileMenu = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-menu-overlay');
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            document.body.style.overflow = '';
        }
        
        // Alternância de abas simples
        window.switchTab = function(tab) {
            const sections = { dashboard: 'tab-dashboard', avisos: 'tab-avisos' };
            const navButtons = { dashboard: 'btn-nav-dashboard', avisos: 'btn-nav-avisos' };
            const title = { dashboard: 'Dashboard Omnichannel', avisos: 'Painel de Controle - Quadro de Avisos' };
            
            Object.keys(sections).forEach(key => {
                document.getElementById(sections[key]).classList.toggle('hidden', key !== tab);
                const btn = document.getElementById(navButtons[key]);
                if (key === tab) {
                    btn.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all duration-200 bg-slate-700 text-white font-medium hover:bg-slate-600 active:scale-[0.98]";
                } else {
                    btn.className = "w-full flex items-center gap-3 px-4 py-3 rounded-xl text-left transition-all duration-200 text-slate-400 hover:bg-slate-700 hover:text-white active:scale-[0.98]";
                }
            });
            document.getElementById('page-title').innerHTML = title[tab];
            
            // Close mobile menu after selection
            if (window.innerWidth < 768) {
                closeMobileMenu();
            }
        }
    </script>

    <!-- INTEGRAÇÃO CORE FIREBASE FIRESTORE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, onSnapshot 
        } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Suas Credenciais Fornecidas
        const firebaseConfig = {
            apiKey: "AIzaSyDG_lUj5dfoawA6ElBxv79f2acVqDKN3bg",
            authDomain: "quadro-de-avisos-2ea31.firebaseapp.com",
            projectId: "quadro-de-avisos-2ea31",
            storageBucket: "quadro-de-avisos-2ea31.firebasestorage.app",
            messagingSenderId: "256469390855",
            appId: "1:256469390855:web:6c1aed35cf65691f7afca2"
        };

        // Inicializações
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "avisos");

        // Estado local da aplicação
        let localAvisos = [];
        let currentFilter = 'ativas';

        // Data helpers locais
        const getTodayString = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        };

        // Ouvinte em tempo real
        const q = query(colRef, orderBy("dataInicio", "desc"));
        onSnapshot(q, (snapshot) => {
            localAvisos = [];
            snapshot.forEach(doc => {
                localAvisos.push({ id: doc.id, ...doc.data() });
            });
            processDashboardIndicators();
            renderAvisos();
            updateDashboardSummary();
        }, (error) => {
            console.error("Erro no Sync Firestore: ", error);
        });
        
        // Update dashboard summary
        function updateDashboardSummary() {
            const hoje = getTodayString();
            const total = localAvisos.length;
            const ativos = localAvisos.filter(a => hoje <= a.dataFim).length;
            document.getElementById('total-avisos-resumo').innerText = total;
            document.getElementById('ativos-resumo').innerText = ativos;
        }

        // Processa as métricas críticas e o badge do dia no Dashboard
        function processDashboardIndicators() {
            const hoje = getTodayString();
            const avisosDoDia = localAvisos.filter(a => hoje >= a.dataInicio && hoje <= a.dataFim);
            
            const badge = document.getElementById('badge-count');
            badge.innerText = avisosDoDia.length;
            
            const btnDia = document.getElementById('btn-avisos-dia');
            btnDia.onclick = () => openDiaModal(avisosDoDia);
        }

        // Renderiza os dados filtrados na Aba de Avisos
        function renderAvisos() {
            const container = document.getElementById('container-avisos');
            const hoje = getTodayString();
            
            let filtered = [...localAvisos];
            if (currentFilter === 'hoje') {
                filtered = localAvisos.filter(a => hoje >= a.dataInicio && hoje <= a.dataFim);
            } else if (currentFilter === 'ativas') {
                filtered = localAvisos.filter(a => hoje <= a.dataFim);
            } else if (currentFilter === '7dias') {
                const dateLimit = new Date();
                dateLimit.setDate(dateLimit.getDate() + 7);
                const limitStr = dateLimit.toISOString().split('T')[0];
                filtered = localAvisos.filter(a => a.dataInicio <= limitStr && a.dataFim >= hoje);
            }

            if(filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-white/80 backdrop-blur-sm rounded-2xl border border-dashed border-gray-300 text-gray-500">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-gray-400"></i>
                        <p class="font-medium text-sm">Nenhum aviso encontrado neste filtro.</p>
                        <p class="text-xs text-gray-400 mt-1">Tente outro filtro ou crie um novo aviso</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(aviso => {
                const isActive = hoje >= aviso.dataInicio && hoje <= aviso.dataFim;
                const badgeStatus = isActive 
                    ? `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-[11px] uppercase font-bold px-2.5 py-1 rounded-lg flex items-center gap-1"><i class="fa-solid fa-circle text-[6px]"></i> Ativo</span>`
                    : `<span class="bg-gray-100 text-gray-600 border border-gray-200 text-[11px] uppercase font-bold px-2.5 py-1 rounded-lg flex items-center gap-1"><i class="fa-solid fa-circle text-[6px]"></i> Inativo</span>`;

                return `
                <div class="bg-white/80 backdrop-blur-sm border border-gray-100 rounded-2xl shadow-md hover:shadow-xl transition-all duration-200 flex flex-col justify-between overflow-hidden card-modern">
                    <div class="p-4 sm:p-5 space-y-3">
                        <div class="flex justify-between items-start gap-2">
                            ${badgeStatus}
                            <div class="flex gap-1">
                                <button onclick="editAviso('${aviso.id}')" class="text-gray-400 hover:text-blue-600 p-2 rounded-xl transition-all touch-target" title="Editar"><i class="fa-solid fa-pen-to-square text-sm"></i></button>
                                <button onclick="deleteAviso('${aviso.id}')" class="text-gray-400 hover:text-red-600 p-2 rounded-xl transition-all touch-target" title="Excluir"><i class="fa-solid fa-trash-can text-sm"></i></button>
                            </div>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 text-base leading-tight">${escapeHtml(aviso.titulo)}</h3>
                            <p class="text-xs text-gray-400 mt-1.5 flex items-center gap-1.5 flex-wrap">
                                <i class="fa-regular fa-calendar"></i> ${formatDate(aviso.dataInicio)} → ${formatDate(aviso.dataFim)}
                            </p>
                        </div>
                        <p class="text-gray-600 text-sm leading-relaxed pt-2 border-t border-gray-100 line-clamp-3">${escapeHtml(aviso.conteudo)}</p>
                    </div>
                </div>`;
            }).join('');
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Manipulação de Filtros
        window.setFilter = function(filterType) {
            currentFilter = filterType;
            const filters = ['todos', 'hoje', '7dias', 'ativas'];
            filters.forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if(f === filterType) {
                    btn.className = "px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 bg-gradient-to-r from-blue-600 to-blue-700 text-white shadow-md touch-target";
                } else {
                    btn.className = "px-4 py-2 text-sm font-medium rounded-xl transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200 touch-target";
                }
            });
            renderAvisos();
        }

        // Submissão do Formulário
        document.getElementById('form-aviso').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('aviso-id').value;
            const payload = {
                titulo: document.getElementById('aviso-titulo').value.trim(),
                conteudo: document.getElementById('aviso-conteudo').value.trim(),
                dataInicio: document.getElementById('aviso-data-inicio').value,
                dataFim: document.getElementById('aviso-data-fim').value
            };
            
            if (!payload.titulo || !payload.conteudo) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            try {
                if(id) {
                    await updateDoc(doc(db, "avisos", id), payload);
                } else {
                    await addDoc(colRef, payload);
                }
                closeFormModal();
            } catch (err) {
                alert("Erro ao salvar no banco Firestore: " + err.message);
            }
        });

        // Deletar Documento
        window.deleteAviso = async function(id) {
            if(confirm("⚠️ Tem certeza que deseja excluir permanentemente este comunicado?")) {
                try {
                    await deleteDoc(doc(db, "avisos", id));
                } catch(err) {
                    alert("Erro ao excluir: " + err.message);
                }
            }
        }

        // Preparar modal para Edição
        window.editAviso = function(id) {
            const item = localAvisos.find(a => a.id === id);
            if(!item) return;

            document.getElementById('aviso-id').value = item.id;
            document.getElementById('aviso-titulo').value = item.titulo;
            document.getElementById('aviso-conteudo').value = item.conteudo;
            document.getElementById('aviso-data-inicio').value = item.dataInicio;
            document.getElementById('aviso-data-fim').value = item.dataFim;

            document.getElementById('modal-form-title').innerHTML = '<i class="fa-solid fa-pen-to-square text-orange-500"></i> Editar Comunicado';
            document.getElementById('modal-form').classList.remove('hidden');
        }

        // Gerenciamento de janelas modais
        window.openFormModal = function() {
            document.getElementById('form-aviso').reset();
            document.getElementById('aviso-id').value = "";
            document.getElementById('modal-form-title').innerHTML = '<i class="fa-solid fa-plus-circle text-orange-500"></i> Novo Aviso';
            document.getElementById('modal-form').classList.remove('hidden');
            document.getElementById('aviso-data-inicio').value = getTodayString();
        }
        
        window.closeFormModal = function() {
            document.getElementById('modal-form').classList.add('hidden');
        }

        window.openDiaModal = function(listaDoDia = []) {
            const container = document.getElementById('container-modal-dia');
            if(listaDoDia.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fa-regular fa-face-smile-wink text-4xl mb-3 text-gray-400"></i>
                        <p class="font-medium text-sm">Nenhum aviso urgente para hoje!</p>
                        <p class="text-xs text-gray-400 mt-1">Tudo tranquilo por aqui 🎉</p>
                    </div>`;
            } else {
                container.innerHTML = listaDoDia.map(aviso => `
                    <div class="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-all">
                        <div class="flex items-start gap-3">
                            <div class="bg-orange-100 p-2 rounded-lg">
                                <i class="fa-solid fa-bell text-orange-600"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-900 text-base mb-2">${escapeHtml(aviso.titulo)}</h4>
                                <p class="text-sm text-gray-700 leading-relaxed">${escapeHtml(aviso.conteudo)}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            document.getElementById('modal-dia').classList.remove('hidden');
        }
        
        window.closeDiaModal = function() {
            document.getElementById('modal-dia').classList.add('hidden');
        }

        // Formatação de data
        function formatDate(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('-');
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }
        
        // Close modals on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFormModal();
                closeDiaModal();
            }
        });
    </script>
</body>
</html>
